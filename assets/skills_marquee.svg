<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%" height="80">
  <defs>
    <!-- Gradients for different technology badges -->
    <linearGradient id="gemini-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8E2DE2" />
      <stop offset="100%" stop-color="#4A00E0" />
    </linearGradient>
    <linearGradient id="python-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3776AB" />
      <stop offset="100%" stop-color="#FFE873" />
    </linearGradient>
    <linearGradient id="fastapi-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#009688" />
      <stop offset="100%" stop-color="#05DFD7" />
    </linearGradient>
    <linearGradient id="chroma-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5F6D" />
      <stop offset="100%" stop-color="#FFC371" />
    </linearGradient>
  </defs>

  <style>
    @keyframes marquee {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-1248px); /* Exactly the width of one set of 8 badges */
      }
    }

    .marquee-track {
      display: flex;
      animation: marquee 30s linear infinite;
    }

    .badge-bg {
      fill: #11121D;
      stroke: #2A2D44;
      stroke-width: 1.5;
      rx: 10px;
      transition: stroke 0.3s;
    }

    .badge-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      fill: #E2E8F0;
    }

    /* Individual badge borders on hover (if loaded inline/interactively) */
    .badge-next:hover .badge-bg { stroke: #FFFFFF; }
    .badge-fastapi:hover .badge-bg { stroke: #05DFD7; }
    .badge-python:hover .badge-bg { stroke: #FFE873; }
    .badge-chroma:hover .badge-bg { stroke: #FFC371; }
    .badge-gemini:hover .badge-bg { stroke: #8E2DE2; }
    .badge-docker:hover .badge-bg { stroke: #2496ED; }
    .badge-react:hover .badge-bg { stroke: #61DAFB; }
    .badge-typescript:hover .badge-bg { stroke: #3178C6; }
  </style>

  <!-- Mask to fade edge of scroll container -->
  <g class="marquee-track">
    
    <!-- ==================== SET 1 ==================== -->
    <!-- Next.js (x: 10) -->
    <g class="badge-next" transform="translate(10, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <circle cx="30" cy="25" r="10" fill="#FFFFFF" />
      <path d="M33.5 30.5 L28.2 22 L27 23.3 L27 30.5 L25 30.5 L25 19.5 L27 19.5 L32.3 27.5 L33.5 26.2 L33.5 19.5 L35.5 19.5 L35.5 30.5 Z" fill="#000000" />
      <text class="badge-text" x="52" y="30">Next.js</text>
    </g>

    <!-- FastAPI (x: 166) -->
    <g class="badge-fastapi" transform="translate(166, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M25 15 L35 25 L30 27 L37 35 L27 25 L32 23 Z" fill="url(#fastapi-grad)" />
      <text class="badge-text" x="52" y="30">FastAPI</text>
    </g>

    <!-- Python (x: 322) -->
    <g class="badge-python" transform="translate(322, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M30 15 C25.5 15 25 17 25 19 L25 21 L30 21 L30 22 L23 22 C21 22 20 23.5 20 27 C20 30.5 21.5 31 24 31 L26 31 L26 29 C26 26.5 27.5 25 30 25 L35 25 L35 20 C35 16.5 33.5 15 30 15 Z" fill="#3776AB" />
      <path d="M30 35 C34.5 35 35 33 35 31 L35 29 L30 29 L30 28 L37 28 C39 28 40 26.5 40 23 C40 19.5 38.5 19 36 19 L34 19 L34 21 C34 23.5 32.5 25 30 25 L25 25 L25 30 C25 33.5 26.5 35 30 35 Z" fill="#FFE873" />
      <text class="badge-text" x="52" y="30">Python</text>
    </g>

    <!-- ChromaDB (x: 478) -->
    <g class="badge-chroma" transform="translate(478, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M22 17 L38 17 L38 22 L22 22 Z M22 24 L38 24 L38 29 L22 29 Z M22 31 L38 31 L38 36 L22 36 Z" fill="url(#chroma-grad)" />
      <text class="badge-text" x="52" y="30">ChromaDB</text>
    </g>

    <!-- Gemini AI (x: 634) -->
    <g class="badge-gemini" transform="translate(634, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M30 15 C30 20.5 25.5 25 20 25 C25.5 25 30 29.5 30 35 C30 29.5 34.5 25 40 25 C34.5 25 30 20.5 30 15 Z" fill="url(#gemini-grad)" />
      <text class="badge-text" x="52" y="30">Gemini AI</text>
    </g>

    <!-- Docker (x: 790) -->
    <g class="badge-docker" transform="translate(790, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M20 26 h4 v4 h-4 z M25 26 h4 v4 h-4 z M30 26 h4 v4 h-4 z M25 21 h4 v4 h-4 z M30 21 h4 v4 h-4 z M35 21 h4 v4 h-4 z M30 16 h4 v4 h-4 z M22 32 c0 4 3.5 5 7 5 s7-1 7-5 L36 31 L20 31 Z" fill="#2496ED" />
      <text class="badge-text" x="52" y="30">Docker</text>
    </g>

    <!-- React (x: 946) -->
    <g class="badge-react" transform="translate(946, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <ellipse cx="30" cy="25" rx="11" ry="4" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(30 30 25)" />
      <ellipse cx="30" cy="25" rx="11" ry="4" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(90 30 25)" />
      <ellipse cx="30" cy="25" rx="11" ry="4" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(150 30 25)" />
      <circle cx="30" cy="25" r="2" fill="#61DAFB" />
      <text class="badge-text" x="52" y="30">React</text>
    </g>

    <!-- TypeScript (x: 1102) -->
    <g class="badge-typescript" transform="translate(1102, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <rect x="21" y="16" width="18" height="18" fill="#3178C6" rx="2" />
      <text x="34" y="31" fill="#FFFFFF" font-family="sans-serif" font-weight="900" font-size="10" text-anchor="middle">TS</text>
      <text class="badge-text" x="52" y="30">TypeScript</text>
    </g>


    <!-- ==================== SET 2 ==================== -->
    <!-- Next.js (x: 1258) -->
    <g class="badge-next" transform="translate(1258, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <circle cx="30" cy="25" r="10" fill="#FFFFFF" />
      <path d="M33.5 30.5 L28.2 22 L27 23.3 L27 30.5 L25 30.5 L25 19.5 L27 19.5 L32.3 27.5 L33.5 26.2 L33.5 19.5 L35.5 19.5 L35.5 30.5 Z" fill="#000000" />
      <text class="badge-text" x="52" y="30">Next.js</text>
    </g>

    <!-- FastAPI (x: 1414) -->
    <g class="badge-fastapi" transform="translate(1414, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M25 15 L35 25 L30 27 L37 35 L27 25 L32 23 Z" fill="url(#fastapi-grad)" />
      <text class="badge-text" x="52" y="30">FastAPI</text>
    </g>

    <!-- Python (x: 1570) -->
    <g class="badge-python" transform="translate(1570, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M30 15 C25.5 15 25 17 25 19 L25 21 L30 21 L30 22 L23 22 C21 22 20 23.5 20 27 C20 30.5 21.5 31 24 31 L26 31 L26 29 C26 26.5 27.5 25 30 25 L35 25 L35 20 C35 16.5 33.5 15 30 15 Z" fill="#3776AB" />
      <path d="M30 35 C34.5 35 35 33 35 31 L35 29 L30 29 L30 28 L37 28 C39 28 40 26.5 40 23 C40 19.5 38.5 19 36 19 L34 19 L34 21 C34 23.5 32.5 25 30 25 L25 25 L25 30 C25 33.5 26.5 35 30 35 Z" fill="#FFE873" />
      <text class="badge-text" x="52" y="30">Python</text>
    </g>

    <!-- ChromaDB (x: 1726) -->
    <g class="badge-chroma" transform="translate(1726, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M22 17 L38 17 L38 22 L22 22 Z M22 24 L38 24 L38 29 L22 29 Z M22 31 L38 31 L38 36 L22 36 Z" fill="url(#chroma-grad)" />
      <text class="badge-text" x="52" y="30">ChromaDB</text>
    </g>

    <!-- Gemini AI (x: 1882) -->
    <g class="badge-gemini" transform="translate(1882, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M30 15 C30 20.5 25.5 25 20 25 C25.5 25 30 29.5 30 35 C30 29.5 34.5 25 40 25 C34.5 25 30 20.5 30 15 Z" fill="url(#gemini-grad)" />
      <text class="badge-text" x="52" y="30">Gemini AI</text>
    </g>

    <!-- Docker (x: 2038) -->
    <g class="badge-docker" transform="translate(2038, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <path d="M20 26 h4 v4 h-4 z M25 26 h4 v4 h-4 z M30 26 h4 v4 h-4 z M25 21 h4 v4 h-4 z M30 21 h4 v4 h-4 z M35 21 h4 v4 h-4 z M30 16 h4 v4 h-4 z M22 32 c0 4 3.5 5 7 5 s7-1 7-5 L36 31 L20 31 Z" fill="#2496ED" />
      <text class="badge-text" x="52" y="30">Docker</text>
    </g>

    <!-- React (x: 2194) -->
    <g class="badge-react" transform="translate(2194, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <ellipse cx="30" cy="25" rx="11" ry="4" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(30 30 25)" />
      <ellipse cx="30" cy="25" rx="11" ry="4" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(90 30 25)" />
      <ellipse cx="30" cy="25" rx="11" ry="4" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(150 30 25)" />
      <circle cx="30" cy="25" r="2" fill="#61DAFB" />
      <text class="badge-text" x="52" y="30">React</text>
    </g>

    <!-- TypeScript (x: 2350) -->
    <g class="badge-typescript" transform="translate(2350, 15)">
      <rect class="badge-bg" width="140" height="50" />
      <rect x="21" y="16" width="18" height="18" fill="#3178C6" rx="2" />
      <text x="34" y="31" fill="#FFFFFF" font-family="sans-serif" font-weight="900" font-size="10" text-anchor="middle">TS</text>
      <text class="badge-text" x="52" y="30">TypeScript</text>
    </g>
    
  </g>
</svg>
